name: Validate contribution

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: contribution-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  guard:
    name: Contribution guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enforce contribution restrictions
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: node packages/tooling/scripts/check-contribution-pr.mjs

      - name: Check repository structure
        run: node packages/tooling/scripts/check-repository.mjs
