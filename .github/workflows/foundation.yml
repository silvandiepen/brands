name: Foundation checks

on:
  pull_request:
  push:
    branches:
      - main
      - foundation/open-brands-platform
    paths-ignore:
      - '**/*.md'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check migration script syntax
        run: node --check scripts/migrate-legacy.mjs

      - name: Check foundation script syntax
        run: node --check scripts/check-foundation.mjs

      - name: Validate preserved data and documentation
        run: node scripts/check-foundation.mjs

      - name: Verify migration is reproducible
        run: |
          node scripts/migrate-legacy.mjs
          git diff --exit-code -- data legacy
