name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install workspace
        run: pnpm install --no-frozen-lockfile

      - name: Check repository structure
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Check contribution tooling syntax
        run: |
          node --check packages/tooling/scripts/check-contribution-pr.mjs
          node --check packages/tooling/scripts/test-contribution-guard.mjs

      - name: Generate dataset
        run: pnpm generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify clean working tree
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Working tree is dirty after build. Generated output may not be deterministic."
            git diff --stat
            exit 1
          fi
